<!DOCTYPE html>
<html lang="en">
<head>

  <title>Thank You — The People's QS</title>

  <!-- Google Ads Conversion Tag — replace AW-XXXXXXXXXX/YYYYYYYYYYYY with real IDs -->

  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a; color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .container { max-width: 560px; width: 100%; text-align: center; }
    .hat { font-size: 80px; margin-bottom: 24px; display: block; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .badge {
      display: inline-block; background: #cc0000; color: #fff;
      font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      padding: 5px 14px; border-radius: 20px; margin-bottom: 20px;
    }
    h1 { font-size: 36px; font-weight: 800; line-height: 1.15; margin-bottom: 12px; }
    h1 span { color: #cc0000; }
    .subtitle { font-size: 16px; color: #aaa; line-height: 1.6; margin-bottom: 36px; }
    .back-link {
      display: inline-block; background: #cc0000; color: #fff; text-decoration: none;
      border-radius: 10px; padding: 14px 28px; font-size: 15px; font-weight: 700;
      transition: background 0.2s;
    }
    .back-link:hover { background: #e60000; }
    .check { font-size: 64px; margin-bottom: 16px; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <span class="check">✅</span>
    <span class="badge">Received</span>
    <h1>Nomination <span>Received.</span></h1>
    <p class="subtitle">
      Got it. I'll be looking into this personally.<br>
      Nobody is safe — not councils, not government, not contractors.<br><br>
      Watch this space.
    </p>
    <a href="/peoples-qs/" class="back-link">🎩 Submit Another</a>
  </div>
</body>
